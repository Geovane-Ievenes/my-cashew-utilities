<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central Financeira - Cashew</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin-top: 30px;
        }

        /* Avatar / Logo do topo */
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background-color: #198754;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            margin: 0 auto 15px auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 22px;
            color: #333;
            margin-bottom: 5px;
        }

        p {
            font-size: 14px;
            color: #666;
            margin-bottom: 35px;
        }

        /* Estilo base dos botões (Estilo LinkTree) */
        .link-btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            background-color: #ffffff;
            color: #333;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.04);
            transition: all 0.2s ease-in-out;
            box-sizing: border-box;
        }

        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
            border-color: #ccc;
        }

        /* Variações de cores para facilitar o uso visual */
        .btn-pessoal {
            border-left: 5px solid #007bff;
        }

        .btn-negocios {
            border-left: 5px solid #6f42c1;
        }

        .btn-ganhos {
            border-left: 5px solid #198754;
        }

        .btn-admin {
            background-color: #e9ecef;
            color: #495057;
            border-left: 5px solid #6c757d;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar">C</div>
        <h1>Lançamentos Cashew</h1>
        <p>Hub de automação financeira</p>

        <a href="compras-online-cashew.html" class="link-btn btn-pessoal">
            🛒 Compras Pessoais (Online)
        </a>
        
        <a href="compras-insumos-negocios-cashew.html" class="link-btn btn-negocios">
            💼 Compras de Negócios
        </a>
        
        <a href="holerite-to-cashew.html" class="link-btn btn-ganhos">
            📄 Registrar Ganhos (Holerite)
        </a>

        <a href="editar-lojas-online.html" class="link-btn btn-admin">
            ⚙️ Editar Lista de Lojas
        </a>
    </div>

</body>
</html>
